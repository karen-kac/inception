[PHP]

; Performance
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
upload_max_filesize = 64M
post_max_size = 64M

; Error handling
display_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Timezone
date.timezone = UTC

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Session
session.save_handler = files
session.save_path = /tmp
session.cookie_httponly = On
session.cookie_secure = On
session.use_strict_mode = On

; File uploads
file_uploads = On
max_file_uploads = 20

; Character encoding
default_charset = "UTF-8"

